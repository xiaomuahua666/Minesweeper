<!-- 不蒜子官方原版统计脚本 -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
// 自动年份
document.getElementById('copyright-year').textContent = new Date().getFullYear();

// 底部滚动轮播
const loopInner = document.getElementById('footerLoopInner');
let currentIndex = 0;
const itemCount = 2;

setInterval(() => {
  currentIndex = (currentIndex + 1) % itemCount;
  loopInner.style.transform = `translateY(-${currentIndex * 1.2}rem)`;
}, 3000);

// 夜间模式兼容
if(localStorage.getItem('night') == 1){
  document.body.style.background = 'black';
  document.body.style.color = 'silver';
  document.querySelectorAll('a').forEach(a => a.style.color = 'silver');
  document.querySelectorAll('.footer-loop-item').forEach(item => item.style.color = 'silver');
}
</script>
