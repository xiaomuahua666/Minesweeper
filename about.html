<!-- 不蒜子访问统计 -->
<script async src="https://cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js"></script>
<script>
// 自动年份
document.getElementById('copyright-year').textContent = new Date().getFullYear();

// 网站运行时长
const LAUNCH_DATE = new Date('2026-01-01 00:00:00').getTime();
function updateUptime() {
  const diff = Date.now() - LAUNCH_DATE;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  document.getElementById('site-uptime').textContent = 
    `${days}天${hours}小时${minutes}分${String(seconds).padStart(2, '0')}秒`;
}
updateUptime();
setInterval(updateUptime, 1000);

// 底部轮播
const loopItems = document.querySelectorAll('.footer-loop-item');
let currentIndex = 0;
setInterval(() => {
  loopItems[currentIndex].style.opacity = '0';
  currentIndex = (currentIndex + 1) % loopItems.length;
  loopItems[currentIndex].style.opacity = '1';
}, 3000);

// 夜间模式兼容
if(localStorage.getItem('night') == 1){
  document.body.style.background = 'black';
  document.body.style.color = 'silver';
  document.querySelectorAll('a').forEach(a => a.style.color = 'silver');
  loopItems.forEach(item => item.style.color = 'silver');
}
</script>
